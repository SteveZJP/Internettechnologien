<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personalverwaltung</title>
    <script src="script.js" defer></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container my-4">
      <div class="header bg-primary text-white p-4 rounded mb-4">
        <h1 class="mb-0">Personalverwaltung</h1>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h4 mb-4">Neuen Mitarbeiter erfassen</h2>

          <form>
            <div class="row mb-3 align-items-center">
              <label for="vorname" class="col-3 col-form-label">Vorname:</label>
              <div class="col-9">
                <input type="text" id="vorname" class="form-control" />
              </div>
            </div>

            <div class="row mb-3 align-items-center">
              <label for="nachname" class="col-3 col-form-label"
                >Nachname:</label
              >
              <div class="col-9">
                <input type="text" id="nachname" class="form-control" />
              </div>
            </div>

            <div class="row mb-3 align-items-center">
              <label for="adresse" class="col-3 col-form-label">Adresse:</label>
              <div class="col-9">
                <input type="text" id="adresse" class="form-control" />
              </div>
            </div>

            <div class="row mb-3 align-items-center">
              <label for="groesse" class="col-3 col-form-label"
                >Größe (cm):</label
              >
              <div class="col-9">
                <input
                  type="number"
                  id="groesse"
                  min="50"
                  max="250"
                  class="form-control"
                />
              </div>
            </div>

            <div class="row mb-3 align-items-center">
              <label for="gewicht" class="col-3 col-form-label"
                >Gewicht (kg):</label
              >
              <div class="col-9">
                <input
                  type="number"
                  id="gewicht"
                  min="20"
                  max="300"
                  step="0.1"
                  class="form-control"
                />
              </div>
            </div>

            <div class="row mb-3 align-items-center">
              <label for="bmi" class="col-3 col-form-label"
                >BMI: <span id="weightcondition"></span
              ></label>
              <div class="col-9">
                <input type="number" id="bmi" class="form-control" readonly />
              </div>
            </div>

            <button type="submit" class="btn btn-primary">
              Mitarbeiter hinzufügen
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="calculateBMI()"
            >
              BMI berechnen
            </button>
          </form>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h4 mb-4">Mitarbeiter suchen</h2>

          <div class="row mb-3 align-items-center">
            <label for="userId" class="col-3 col-form-label"
              >Mitarbeiter-ID:</label
            >
            <div class="col-9">
              <input
                type="number"
                id="userId"
                min="1"
                max="10"
                class="form-control"
              />
            </div>
          </div>

          <button
            id="loadUserBtn"
            class="btn btn-success"
            onclick="ladeAlleBenutzer()"
          >
            Mitarbeiter laden
          </button>
          <div id="userDetails"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h2 class="h4 mb-4">Mitarbeiterübersicht</h2>

          <table class="table table-striped table-bordered">
            <thead class="table-light">
              <tr>
                <th>Vorname</th>
                <th>Nachname</th>
                <th>Adresse</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Anna</td>
                <td>Müller</td>
                <td>Musterstraße 1, Kempten</td>
              </tr>
              <tr>
                <td>Max</td>
                <td>Schneider</td>
                <td>Bahnhofstraße 12, Ulm</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
