<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="header">
      <h1>Personalverwaltung</h1>
    </div>

    <div class="section">
      <h2>Neuen Mitarbeiter erfassen</h2>
      <label>Vorname:</label>
      <input type="text" name="vorname" size="30" maxlength="30" /><br />
      <label>Nachname:</label>
      <input type="text" name="nachname" size="30" maxlength="30" /><br />
      <label>Adresse:</label>
      <input type="text" name="adresse" size="30" maxlength="30" /><br />
      <label>Größe (cm):</label>
      <input type="number" name="groesse" min="40" max="300" step="1" /><br />
      <label>Gewicht (kg):</label>
      <input
        type="number"
        name="gewicht"
        min="30"
        max="200"
        step="0.1"
        pattern="[0-9]{3}"
      /><br />
      <label>BMI:</label><input type="number" name="bmi" readonly /><br />
      <button class="buttons">Mitarbeiter hinzufügen</button>
    </div>

    <div class="section">
      <h2>Mitarbeiter suchen</h2>
      Mitarbeiter-ID: <input type="number" name="mitID" pattern="[0-9]{3}" />
      <button class="buttons">Mitarbeiter laden</button>
    </div>

    <div class="section">
      <h2>Mitarbeiterübersicht</h2>
      <table border="1">
        <thead>
          <tr>
            <th>Vorname</th>
            <th>Nachname</th>
            <th>Adresse</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Anna</td>
            <td>Müller</td>
            <td>Musterstraße 1, Kempten</td>
          </tr>
          <tr>
            <td>Max</td>
            <td>Schneider</td>
            <td>Bahnhofstraße 12, Ulm</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
